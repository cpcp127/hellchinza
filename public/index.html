<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가보자운동</title>

    <style>
        body{
        font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Segoe UI",sans-serif;
        line-height:1.7;
        margin:0;
        background:#f7f8fa;
        color:#111827;
        }

        .container{
        max-width:860px;
        margin:0 auto;
        padding:60px 20px 80px;
        background:#ffffff;
        min-height:100vh;
        box-sizing:border-box;
        text-align:center;
        }

        h1{
        font-size:36px;
        margin-bottom:10px;
        }

        .subtitle{
        color:#6b7280;
        margin-bottom:40px;
        }

        .linkBox{
        display:flex;
        flex-direction:column;
        gap:12px;
        margin-top:40px;
        }

        .link{
        display:block;
        padding:14px;
        border-radius:10px;
        background:#f1f4f5;
        text-decoration:none;
        color:#111827;
        font-weight:500;
        border:1px solid #e5e7eb;
        transition:0.15s;
        }

        .link:hover{
        background:#e9eef1;
        }

        .footer{
        margin-top:60px;
        font-size:14px;
        color:#6b7280;
        }
    </style>

</head>

<body>

<div class="container">

    <h1>가보자운동</h1>

    <p class="subtitle">
        운동 기록 · 운동 모임 · 운동 커뮤니티
    </p>

    <div class="linkBox">

        <a class="link" href="/privacy">
            개인정보 처리방침
        </a>

        <a class="link" href="/terms">
            서비스 이용약관
        </a>

        <a class="link" href="/support">
            고객지원
        </a>

    </div>

    <div class="footer">
        © 2026 가보자운동
    </div>

</div>

</body>
</html>
