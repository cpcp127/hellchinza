name: Flutter CI (Automated Test)

# 1. 언제 이 로봇을 작동시킬 것인가? (Trigger)
on:
  push:
    branches: [ "main", "develop" ] # main이나 develop 브랜치에 코드가 올라갈 때
  pull_request:
    branches: [ "main" ] # main 브랜치로 PR을 날릴 때

jobs:
  test:
    name: Run Unit & Widget Tests
    # 2. 어떤 컴퓨터에서 돌릴 것인가? (가상의 우분투 리눅스 서버를 하나 빌립니다)
    runs-on: ubuntu-latest

    steps:
      # 3. 깃허브 서버(가상 컴퓨터)로 내 소스코드를 다운받아 옵니다.
      - name: 📥 소스코드 체크아웃
        uses: actions/checkout@v4

      # 4. 안드로이드 빌드 및 플러터 환경을 위해 Java를 설치합니다.
      - name: ☕ Java 환경 세팅
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # 5. 플러터 SDK를 가상 컴퓨터에 설치합니다.
      - name: 🐦 Flutter 환경 세팅
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # 필요하다면 앱에서 사용하는 특정 버전을 명시할 수도 있습니다. (예: flutter-version: '3.19.0')

      # 6. pubspec.yaml에 있는 패키지들을 다운로드합니다.
      - name: 📦 패키지 설치 (pub get)
        run: flutter pub get

      # 🔥 [핵심 추가] 금고에 숨겨둔 값으로 가상 컴퓨터 안에 .env 파일을 즉석 생성합니다!
      - name: 🔐 .env 파일 동적 생성
        run: echo "${{ secrets.ENV_FILE_CONTENT }}" > .env

      # 7. 🔥 하이라이트: 우리가 지금까지 열심히 짠 테스트를 실행합니다!
      - name: 🧪 테스트 코드 실행
        run: flutter test