name: Flutter CI/CD Pipeline (AOS & iOS)

on:
  push:
    branches: [ "main", "develop" ]

jobs:
  # ==========================================
  # 🤖 [Job 1] Android 빌드 및 테스트, 배포
  # ==========================================
  build_and_deploy_android:
    name: Build & Deploy Android
    runs-on: ubuntu-latest # 안드로이드는 우분투에서 빠르게 처리합니다.

    steps:
      - name: 📥 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: ☕ Java 환경 세팅
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 Flutter 환경 세팅
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 📦 패키지 설치
        run: flutter pub get

      - name: 🔐 .env 파일 동적 생성
        run: echo "${{ secrets.ENV_FILE_CONTENT }}" > .env

      # 🔥 [수정됨] JSON 파일 찌그러짐 에러를 막기 위해 EOF 대신 '진짜 json 파일'을 즉석 생성합니다!
      - name: 🔀 브랜치 기준 환경변수 설정 및 인증키 파일 생성
        env:
          SA_PROD: ${{ secrets.FIREBASE_SA_PROD }}
          SA_DEV: ${{ secrets.FIREBASE_SA_DEV }}
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "FLAVOR=prod" >> $GITHUB_ENV
            echo "APP_ID=${{ secrets.AOS_APP_ID_PROD }}" >> $GITHUB_ENV
            echo "$SA_PROD" > firebase_credentials.json
          else
            echo "FLAVOR=dev" >> $GITHUB_ENV
            echo "APP_ID=${{ secrets.AOS_APP_ID_DEV }}" >> $GITHUB_ENV
            echo "$SA_DEV" > firebase_credentials.json
          fi

      - name: 🧪 테스트 코드 실행 (CI)
        run: flutter test

      # 🔥 [유지됨] 빌드 직전에 Keystore와 key.properties를 동적으로 복원합니다.
      - name: 🔐 안드로이드 서명 키 복원
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          # 1. Base64 텍스트를 다시 .jks 파일로 복원해서 android/app/ 폴더 안에 넣습니다.
          echo $KEYSTORE_BASE64 | base64 --decode > android/app/release-key.jks
          
          # 2. android/ 폴더 안에 key.properties 파일을 즉석에서 생성합니다.
          cat <<EOF > android/key.properties
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=release-key.jks
          EOF

      # 빌드 시 --target 없이 --flavor만 지정합니다. (main.dart 단일 사용)
      - name: 📱 AOS APK 빌드
        run: flutter build apk --release --flavor ${{ env.FLAVOR }}

      # 🔥 [수정됨] serviceCredentialsFileContent 대신 File(경로) 옵션을 사용합니다.
      - name: 🚀 AOS Firebase App Distribution 배포
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ env.APP_ID }}
          serviceCredentialsFile: firebase_credentials.json
          groups: testers
          file: build/app/outputs/flutter-apk/app-${{ env.FLAVOR }}-release.apk

