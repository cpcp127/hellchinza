name: Flutter CI/CD Pipeline (AOS & iOS)

on:
  push:
    branches: [ "main", "develop" ]

jobs:
  # ==========================================
  # 🤖 [Job 1] Android 빌드 및 테스트, 배포
  # ==========================================
  build_and_deploy_android:
    name: Build & Deploy Android
    runs-on: ubuntu-latest # 안드로이드는 우분투에서 빠르게 처리합니다.

    steps:
      - name: 📥 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: ☕ Java 환경 세팅
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 Flutter 환경 세팅
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 📦 패키지 설치
        run: flutter pub get

      - name: 🔐 .env 파일 동적 생성
        run: echo "${{ secrets.ENV_FILE_CONTENT }}" > .env

      # 🔥 [핵심 분기] Push된 브랜치에 따라 환경 변수(Flavor, 앱ID, 키)를 다르게 세팅합니다!
      - name: 🔀 브랜치 기준 환경변수 설정
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "FLAVOR=prod" >> $GITHUB_ENV
            echo "APP_ID=${{ secrets.AOS_APP_ID_PROD }}" >> $GITHUB_ENV
            echo "SA_KEY<<EOF" >> $GITHUB_ENV
            echo "${{ secrets.FIREBASE_SA_PROD }}" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          else
            echo "FLAVOR=dev" >> $GITHUB_ENV
            echo "APP_ID=${{ secrets.AOS_APP_ID_DEV }}" >> $GITHUB_ENV
            echo "SA_KEY<<EOF" >> $GITHUB_ENV
            echo "${{ secrets.FIREBASE_SA_DEV }}" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi

      - name: 🧪 테스트 코드 실행 (CI)
        run: flutter test

      # 빌드 시 --target 없이 --flavor만 지정합니다. (main.dart 단일 사용)
      - name: 📱 AOS APK 빌드
        run: flutter build apk --release --flavor ${{ env.FLAVOR }}

      - name: 🚀 AOS Firebase App Distribution 배포
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ env.APP_ID }}
          serviceCredentialsFileContent: ${{ env.SA_KEY }}
          groups: testers
          file: build/app/outputs/flutter-apk/app-${{ env.FLAVOR }}-release.apk

